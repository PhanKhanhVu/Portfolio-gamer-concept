<svg xmlns="http://www.w3.org/2000/svg"
     width="512" height="512"
     viewBox="0 0 512 512">

  <!-- Background -->
  <rect width="512" height="512" fill="black"/>

  <!-- Cyan glitch -->
  <text x="50%" y="55%"
        text-anchor="middle"
        dominant-baseline="middle"
        font-size="220"
        font-weight="900"
        font-family="Arial Black, Impact, sans-serif"
        fill="#00FFFF"
        transform="translate(-6,0)">
    PKV
  </text>

  <!-- Red glitch -->
  <text x="50%" y="55%"
        text-anchor="middle"
        dominant-baseline="middle"
        font-size="220"
        font-weight="900"
        font-family="Arial Black, Impact, sans-serif"
        fill="#FF2A2A"
        transform="translate(6,0)">
    PKV
  </text>

  <!-- Main text -->
  <text x="50%" y="55%"
        text-anchor="middle"
        dominant-baseline="middle"
        font-size="220"
        font-weight="900"
        font-family="Arial Black, Impact, sans-serif"
        fill="white">
    PKV
  </text>

</svg>